- weather:
  - name: Aussenwetter
    unique_id: weather.aussenwetter
    condition: '{{ states(''weather.openweathermap'') }}'
    humidity: '{{ states(''sensor.rtl433_aussensensor_luftfeuchtigkeit'') | float(0)
      }}'
    temperature: '{{ states(''sensor.rtl433_aussensensor_temperatur'') | float(0)
      }}'

