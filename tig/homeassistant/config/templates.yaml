- sensor:
  - name: ABC Temperature
    unique_id: uniqueid__abc_temperature
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    state: "{{ state_attr('climate.heater', 'current_temperature') | int(0) }}"

#tasmota_ble/tele/bad {"Time":"2022-01-20T23:40:57","alias":"bad","mac":"a4c138e4edc2","Temperature":22.6,"Humidity":65.0,"DewPoint":15.7,"Battery":57,"RSSI":-83}
# https://community.home-assistant.io/t/alert-when-devices-have-low-battery/258072
# select('ge', 0) b4 list
  - name: 'Devices with low battery'
    default_entity_id: sensor.devices_with_low_battery
    unit_of_measurement: devices
    state: >-
      {% set ignore_entities = ['sensor.phone_1_battery_level', 'sensor.phone_2_battery_level', '...'] %}
      {{ states.sensor
         | selectattr('attributes.device_class', 'defined')
         | selectattr('attributes.device_class', 'eq', 'battery')
         | rejectattr('entity_id', 'in', ignore_entities)
         | map(attribute='state')
         | reject('in', ['unknown', 'unavailable', 'Ok'])
         | map('int', -1) | select('le', 10)
         | list | count
      }}
    icon: >-
      {% if is_state('sensor.devices_with_low_battery', '0') %}
        mdi:check-circle
      {% else %}
        mdi:battery-alert
      {% endif %}

