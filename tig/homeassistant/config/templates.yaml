# 'condition_template'
- weather:
  - name: Aussenwetter
    unique_id: weather.aussenwetter
    # Received invalid weather condition: unknown for entity weather.aussenwetter, expected one of clear-night, cloudy, exceptional, fog, hail, lightning-rainy, lightning, partlycloudy, pouring, rainy, snowy-rainy, snowy, sunny, windy-variant, windy
    condition_template: "{{ states('weather.openweathermap') }}"
    humidity_template: "{{ states('sensor.aussensensor_luftfeuchtigkeit') | float(0) }}"
    temperature_template: "{{ states('sensor.aussensensor_temperatur') | float(0) }}"

