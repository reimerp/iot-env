# zigbee does not autodiscover
  - name: "Zigbee Controller Battery Level"
    unique_id: "sensor.zigbee_controller_battery_level"
    state_topic: "tasmota/zigbee/tele/STATE"
    unit_of_measurement: '%'
    value_template: "{{ ((value_json.Vcc | float(-1) - 3.3) * 600) | round() }}"
    device_class: battery
    availability:
    - topic: "tasmota/zigbee/tele/LWT"
      payload_available: "Online"
      payload_not_available: "Offline"

# issue is bug in tasmota RSS should be dBm
  - name: "Wi-Fi Quality"
    unique_id: "sensor.tasmota.wifi.rssi"
    state_topic: "tasmota/kerze/tele/STATE"
    unit_of_measurement: "dBm"
    value_template: "{{ value_json['Wifi'].Signal }}"
    device_class: signal_strength
    availability:
    - topic: "tasmota/kerze/tele/LWT"
      payload_available: "Online"
      payload_not_available: "Offline"

# Track Firmware
  - name: "Tasmota Firmware"
    unique_id: "sensor.tasmota.firmware"
    state_topic: "tasmota/flur/stat/STATUS2"
    value_template: "{{value_json['StatusFWR'].Version }}"
    availability:
    - topic: "tasmota/flur/tele/LWT"
      payload_available: "Online"
      payload_not_available: "Offline"
    qos: 0

light:
  - name: "Tripod"
    schema: template
    unique_id: "light.zigbee_tripod_0xec1bbdfffeae209a"
    command_topic: "tasmota/zigbee/cmnd/ZbSend"
    command_on_template: '{"Device":"Tripod","Send":{"Power":"ON"}}'
    command_off_template: '{"Device":"Tripod","Send":{"Power":"OFF"}}'
    state_topic: "zigbee/tripod/stat/POWER"
    state_template: "{{ value.lower() }}"
