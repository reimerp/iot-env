sensor:
  - name: "Keller Strom Battery"
    unique_id: "sensor.mt681_battery_level"
    state_topic: "tasmota/strom/tele/STATE"
    unit_of_measurement: "%"
    # 3.1-3.4
    value_template: "{{ ((value_json.Vcc | float(-1) - 3.1) * 333) | round() }}"
    device_class: battery

