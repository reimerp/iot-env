- id: '1549980351867'
  alias: Raster
  description: automatischer trigger alle 5 min
  mode: single
  triggers:
  - trigger: time_pattern
    minutes: /5
  conditions: []
  actions:
  - action: mqtt.publish
    data:
      payload: raster from hp homeasssistent at {{ now() }}
      topic: test/topic
- id: '1665511011214'
  alias: Notify Internet
  description: Notify LG when Internet is gone
  mode: single
  triggers:
  - trigger: mqtt
    topic: test/monitor/inet
  conditions: []
  variables:
    notification_action: notify.lg_webos_tv_uj6309
    message: 'Internet {{ trigger.payload_json[''server''] }}: {{ trigger.payload_json[''error'']
      }}'
  actions:
  - action: '{{ notification_action }}'
    data:
      message: '{{ message }}'
- id: '1640877499206'
  alias: Kein Internet
  description: ''
  mode: single
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.reimers6660_wan_status
    to: 'on'
  conditions: []
  actions:
  - action: notify.lg_webos_tv_uj6309
    data:
      message: Internet offline
- id: '1592816091306'
  alias: Reimer Mqtt Test
  description: wenn irgendeine Nachricht kommt
  mode: single
  triggers:
  - trigger: mqtt
    topic: test/monitor/test
