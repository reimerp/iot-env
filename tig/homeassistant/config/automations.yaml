  triggers:
  - trigger: state
    entity_id:
    - switch.tasmotaflur_flur
    to:
    - 'on'
  conditions: []
  actions:
  - action: notify.lg_webos_tv_uj6309
    data:
      message: Flur Licht angegangen
- id: b4a6eeee95f943f38b2fda58ef067cb4
  alias: Tasmota Firmware Version Check
  triggers:
  - trigger: homeassistant
    event: start
  actions:
  - action: mqtt.publish
    data:
      topic: groups/tasmotas/cmnd/STATUS
      payload: '2'
- id: 92c5adbf2e9443fc98fbb2be6c231ea4
  alias: Backup Home Assistant every night at 3 AM
  description: ''
  mode: single
  triggers:
  - trigger: time
    at: 03:00:00
  actions:
  - action: backup.create
    metadata: {}
    data: {}
- alias: Wake-me up using bedroom lights
  trigger:
    platform: template
    value_template: '{{ states(''sensor.time'') == (states.input_datetime.wakeup_time.attributes.timestamp
      | int | timestamp_custom(''%H:%M'', False)) }}'
  condition:
  - condition: state
    entity_id: input_boolean.wakeup_enabled
    state: 'on'
  - condition: or
    conditions:
    - condition: state
      entity_id: input_boolean.wakeup_weekend
      state: 'on'
    - condition: time
      weekday:
      - mon
      - tue
      - wed
      - thu
      - fri
  action:
  - service: light.turn_on
    entity_id: group.bedroom
    data:
      transition: 600
      brightness: 255
  id: 4db819644f234463ac35152c956b9d78
- id: '1640869317480'
  alias: TV auf PC
  description: ''
  trigger: []
  condition:
  - condition: state
    entity_id: input_boolean.pc_gaming
    state: 'on'
  action:
  - service: media_player.select_source
    target:
      entity_id: media_player.lg_webos_tv_uj6309
    data:
      source: PC
  - service: switch.turn_on
    target:
      entity_id: switch.pc
- id: '1660755876743'
  alias: LG webOS Smart TV - Turn On Action
  description: ''
  use_blueprint:
    path: cvroque/webostv_turn_on.yaml
    input:
      webostv: media_player.lg_webos_tv_uj6309
      webostv_mac: DC-4F-22-F8-F5-77
- id: '1665249726951'
  alias: Package Lost
  description: Note when ping loss is > 90
  trigger:
  - platform: mqtt
    topic: metrics/ping/2a02_8100_6_2__311
    value_template: '{{ value_json[''ping''][''pl''] }}'
  condition: []
  action:
  - service: persistent_notification.create
    data:
      title: Package Loss
      message: '# Ping Loss

        {{ trigger.topic }} is {{ trigger.payload_json[''ping''][''pl''] }}

        '
      notification_id: package_loss_notification
  mode: single
- id: '1729109608364'
  alias: Handy Laden
  description: ''
  mode: single
  triggers:
  - trigger: numeric_state
