# ok automatischer trigger alle 5 min
- id: '1549980351867'
  alias: Raster
  trigger:
  - minutes: /5
    platform: time_pattern
  condition: []
  action:
  - alias: ''
    data:
      payload: raster from hp homeasssistent at {{ now() }}
      topic: test/topic
    service: mqtt.publish

# untested
- alias: Wake-me up using bedroom lights
  trigger:
    platform: template
    value_template: '{{ states(''sensor.time'') == (states.input_datetime.wakeup_time.attributes.timestamp
      | int | timestamp_custom(''%H:%M'', False)) }}'
  condition:
  - condition: state
    entity_id: input_boolean.wakeup_enabled
    state: 'on'
  - condition: or
    conditions:
    - condition: state
      entity_id: input_boolean.wakeup_weekend
      state: 'on'
    - condition: time
      weekday:
      - mon
      - tue
      - wed
      - thu
      - fri
  action:
  - service: light.turn_on
    entity_id: group.bedroom
    data:
      transition: 600
      brightness: 255
  id: 4db819644f234463ac35152c956b9d78

# ok wenn irgendeine Nachricht kommt
- id: '1592816091306'
  alias: Reimer Mqtt Test
  description: description
  trigger:
  - platform: mqtt
    topic: test/monitor/inet
  condition: []
  action:
  - service: persistent_notification.create
    data:
      title: Inet Status
      message: '# Inet Status

        Your message goes *here*
        {{ trigger.payload_json[''server''] }}

        '
      notification_id: inet_state_notification

# ok
- id: '1665511011214'
  alias: Notify Internet
  description: Notify LG when Internet is gone
  triggers:
  - trigger: mqtt
    topic: test/monitor/test
  condition: []
  variables:
    notification_action: notify.lg_webos_tv_uj6309
    message: "Internet {{ trigger.payload_json['server'] }}: {{ trigger.payload_json['error'] }}"
    #notification_action: notify.mobile_app_sm_s921b
  actions:
  - action: "{{ notification_action }}"
    data:
      message: "{{ message }}"
  mode: single

# no:
- id: '1640869317480'
  alias: TV auf PC
  description: ''
  trigger: []
  condition:
  - condition: state
    entity_id: input_boolean.pc_gaming
    state: 'on'
  action:
  - service: media_player.select_source
    target:
      entity_id: media_player.lg_webos_tv_uj6309
    data:
      source: PC
  - service: switch.turn_on
    target:
      entity_id: switch.pc

- id: b4a6eeee95f943f38b2fda58ef067cb4
  alias: Tasmota Firmware Version Check
  trigger:
  - platform: homeassistant
    event: start
  action:
  - service: mqtt.publish
    data:
      topic: groups/tasmotas/cmnd/STATUS
      payload: '2'

- id: '1660755876743'
  alias: LG webOS Smart TV - Turn On Action
  description: ''
  use_blueprint:
    path: cvroque/webostv_turn_on.yaml
    input:
      webostv: media_player.lg
      webostv_mac: DC-4F-22-F8-F5-77

- id: '1665249726951'
  alias: Package Lost
  description: Note when ping loss is > 90
  trigger:
  - platform: mqtt
    topic: metrics/ping/2a02_8100_6_2__311
    value_template: '{{ value_json[''ping''][''pl''] }}'
  condition: []
  action:
  - service: persistent_notification.create
    data:
      title: Package Loss
      message: '# Ping Loss

        {{ trigger.topic }} is {{ trigger.payload_json[''ping''][''pl''] }}

        '
      notification_id: package_loss_notification
  mode: single

- id: '1640877499206'
  alias: Kein Internet
  description: ''
  trigger:
  - platform: state
    #entity_id: sensor.fritz_box_6490_cable_wan_status
    #sensor.reimers6660_wan_status
    entity_id: binary_sensor.reimers6660_wan_status
    from: 'on'
  condition: []
  action:
  - service: notify.lg_webos_tv_uj6309
    data:
      message: Internet offline
  mode: single

- alias: Backup Home Assistant every night at 3 AM
  trigger:
  - platform: time
    at: 03:00:00
  action:
  - service: backup.create
  id: 92c5adbf2e9443fc98fbb2be6c231ea4

- id: '1729109608364'
  alias: Handy Laden
  description: ''
  trigger:
  - type: battery_level
